<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure GitHub Manager</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; margin-right: 10px; cursor: pointer; border: none; color: white; border-radius: 4px; }
        .btn-save { background-color: #28a745; }
        .btn-run { background-color: #0366d6; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>GitHub Repo Manager</h2>
    
    <div class="form-group">
        <label for="input1">Input 1:</label>
        <input type="text" id="input1" placeholder="Enter content 1">
    </div>

    <div class="form-group">
        <label for="input2">Input 2:</label>
        <input type="text" id="input2" placeholder="Enter content 2">
    </div>

    <button class="btn-save" onclick="saveToFile()">Save to GitHub</button>
    <button class="btn-run" onclick="runWorkflow()">Run Workflow</button>

    <div id="status"></div>

    <script>
        const statusText = document.getElementById('status');

        function setStatus(message) {
            statusText.innerText = message;
        }

        // Helper function to safely handle responses
        async function handleResponse(res) {
            const text = await res.text();
            let errorMessage = text || "Unknown server error";
            
            try {
                const errorData = JSON.parse(text);
                if (errorData.error) errorMessage = errorData.error;
            } catch (e) { 
                // It's not JSON, so we just use the raw text
                if (text.includes("<!DOCTYPE html>")) {
                    errorMessage = "Function not found or deployed incorrectly (404).";
                }
            }
            
            if (!res.ok) throw new Error(errorMessage);
        }

        // 1. Function to save inputs to a file via Cloudflare Function
        async function saveToFile() {
            setStatus("Saving to GitHub securely...");
            const val1 = document.getElementById('input1').value;
            const val2 = document.getElementById('input2').value;
            const content = `Input 1: ${val1}\nInput 2: ${val2}`;
            
            const encodedContent = btoa(content);

            try {
                const res = await fetch('/api/github', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'save',
                        content: encodedContent
                    })
                });

                await handleResponse(res);
                setStatus("✅ Successfully saved to repository!");
            } catch (error) {
                setStatus(`❌ Error saving: ${error.message}`);
            }
        }

        // 2. Function to trigger workflow via Cloudflare Function
        async function runWorkflow() {
            setStatus("Triggering workflow securely...");
            try {
                const res = await fetch('/api/github', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'run'
                    })
                });

                await handleResponse(res);
                setStatus("✅ Workflow triggered successfully! Check your Actions tab.");
            } catch (error) {
                setStatus(`❌ Error running workflow: ${error.message}`);
            }
        }
    </script>
</body>
</html>
